<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="${laundry.name}">Laundry Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h1 th:text="${laundry.name}">Laundry Name</h1>
                    <p class="lead" th:text="${laundry.address}">Address</p>
                    <p><strong>График работы:</strong> <span th:text="${laundry.operatingHours}">Operating Hours</span></p>
                </div>
                <div sec:authorize="isAuthenticated()">
                    <form th:action="@{/laundry/{id}/favorite(id=${laundry.id})}" method="post">
                        <button type="submit" class="btn"
                                th:classappend="${favorite} ? 'btn-warning' : 'btn-outline-warning'"
                                th:text="${favorite} ? '★ В избранном' : '☆ В избранное'">Избранное</button>
                    </form>
                </div>
            </div>

            <hr>

            <h3>Оборудование</h3>
            <div class="row mb-4">
                <div class="col-md-6 mb-3" th:each="machine : ${laundry.machines}">
                    <div class="card h-100 shadow-sm" 
                         th:classappend="${machine.busy and #authentication != null and #authentication.name == machine.activeBookingUserEmail} ? 'border-success border-2 bg-success bg-opacity-10' : 'border-0'">
                        <div class="card-body">
                            <h5 class="card-title d-flex justify-content-between align-items-center mb-1">
                                <span th:text="${machine.name}">Machine</span>
                                <span class="badge bg-primary rounded-pill" th:text="${machine.price + ' ₽'}">Price</span>
                            </h5>
                            <p class="card-text text-muted small mb-2" th:text="${machine.typeLabel}">Type</p>
                            
                            <div th:if="${machine.busy}">
                                <div class="alert py-1 px-2 mb-2 small text-center"
                                     th:classappend="${#authentication != null and #authentication.name == machine.activeBookingUserEmail} ? 'alert-success' : 'alert-warning'">
                                    <span th:if="${#authentication != null and #authentication.name == machine.activeBookingUserEmail}"><strong>Ваша стирка.</strong></span>
                                    <span th:unless="${#authentication != null and #authentication.name == machine.activeBookingUserEmail}">Занято.</span>
                                    Осталось: <strong th:text="${machine.remainingMinutes + ' мин'}"></strong>
                                </div>
                                <button class="btn btn-secondary btn-sm w-100" disabled th:text="${#authentication != null and #authentication.name == machine.activeBookingUserEmail ? 'В процессе работы...' : 'Забронировать'}">Забронировать</button>
                            </div>
                            <div th:unless="${machine.busy}">
                                <div class="alert alert-success py-1 px-2 mb-2 small text-center">
                                    Свободна
                                </div>
                                <a sec:authorize="isAuthenticated()" th:href="@{/booking/new(machineId=${machine.id})}" class="btn btn-success btn-sm w-100">Забронировать</a>
                                <a sec:authorize="isAnonymous()" href="/login" class="btn btn-outline-success btn-sm w-100">Войдите для брони</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:if="${laundry.machines.empty}" class="text-muted col-12">Нет доступного оборудования.</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-header">Отзывы</div>
                <div class="card-body">
                    <div id="reviewsList">
                        <div th:each="review : ${laundry.reviews}" class="mb-3 border-bottom pb-2">
                            <div class="d-flex justify-content-between">
                                <strong th:text="${review.userName}">User</strong>
                                <span class="text-warning" th:text="${'★ ' + review.rating}">5</span>
                            </div>
                            <p class="small mb-0" th:text="${review.comment}">Comment</p>
                        </div>
                    </div>
                    <div th:if="${laundry.reviews.empty}" class="text-muted" id="noReviews">Пока нет отзывов.</div>
                    
                    <div sec:authorize="isAuthenticated()" class="mt-3 border-top pt-3">
                        <h6>Оставить отзыв</h6>
                        <form id="ajaxReviewForm">
                            <input type="hidden" id="revLaundryId" th:value="${laundry.id}">
                            <select id="revRating" class="form-select form-select-sm mb-2">
                                <option value="5">★★★★★ (5)</option>
                                <option value="4">★★★★☆ (4)</option>
                                <option value="3">★★★☆☆ (3)</option>
                                <option value="2">★★☆☆☆ (2)</option>
                                <option value="1">★☆☆☆☆ (1)</option>
                            </select>
                            <textarea id="revComment" class="form-control form-control-sm mb-2" placeholder="Напишите ваш отзыв..."></textarea>
                            <button type="submit" class="btn btn-primary btn-sm w-100">Отправить</button>
                            <div id="revError" class="text-danger small mt-1" style="display:none;"></div>
                        </form>
                    </div>
                    <div sec:authorize="isAnonymous()" class="mt-3 border-top pt-3 text-muted small">
                        Войдите, чтобы оставить отзыв.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var form = document.getElementById('ajaxReviewForm');
    if(form) {
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            var errorDiv = document.getElementById('revError');
            errorDiv.style.display = 'none';
            
            var token = document.querySelector("meta[name='_csrf']").getAttribute("content");
            var header = document.querySelector("meta[name='_csrf_header']").getAttribute("content");
            
            var payload = {
                laundryId: document.getElementById('revLaundryId').value,
                rating: document.getElementById('revRating').value,
                comment: document.getElementById('revComment').value
            };

            fetch('/api/reviews', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    [header]: token,
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.json().then(data => ({status: response.status, body: data})))
            .then(res => {
                if (res.status !== 200) {
                    errorDiv.innerText = res.body.message || res.body.error || "Ошибка сервера";
                    errorDiv.style.display = 'block';
                } else {
                    var reviewsList = document.getElementById('reviewsList');
                    var newRev = document.createElement('div');
                    newRev.className = 'mb-3 border-bottom pb-2';
                    var reviewHeader = document.createElement('div');
                    reviewHeader.className = 'd-flex justify-content-between';

                    var userName = document.createElement('strong');
                    userName.textContent = res.body.user || '';

                    var rating = document.createElement('span');
                    rating.className = 'text-warning';
                    rating.textContent = '★ ' + (res.body.rating || '');

                    var comment = document.createElement('p');
                    comment.className = 'small mb-0';
                    comment.textContent = res.body.comment || '';

                    reviewHeader.appendChild(userName);
                    reviewHeader.appendChild(rating);
                    newRev.appendChild(reviewHeader);
                    newRev.appendChild(comment);
                    reviewsList.appendChild(newRev);
                    document.getElementById('revComment').value = '';
                    
                    var noReviews = document.getElementById('noReviews');
                    if (noReviews) noReviews.style.display = 'none';
                }
            })
            .catch(err => {
                errorDiv.innerText = "Сетевая ошибка";
                errorDiv.style.display = 'block';
            });
        });
    }
});
</script>
</body>
</html>
