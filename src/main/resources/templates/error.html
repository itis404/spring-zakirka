<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="alert alert-danger shadow-sm">
        <h4 class="alert-heading" th:text="${code != null ? 'Ошибка ' + code : 'Произошла ошибка'}">Oops!</h4>
        <p class="lead" th:text="${message != null ? message : (exception != null ? exception.message : 'Что-то пошло не так.')}">Error message</p>
        <hr th:if="${url}">
        <p class="mb-0" th:if="${url}">Запрошенный адрес: <span th:text="${url}">URL</span></p>
    </div>
    <div class="text-center mt-4">
        <a href="/" class="btn btn-primary px-5">Вернуться на главную</a>
    </div>
</div>
</body>
</html>
