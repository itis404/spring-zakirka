<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header text-center"><h3>Вход</h3></div>
                <div class="card-body">
                    <div th:if="${param.error}" class="alert alert-danger">Неверный email или пароль.</div>
                    <div th:if="${param.logout}" class="alert alert-success">Вы вышли из аккаунта.</div>
                    <div th:if="${param.deleted}" class="alert alert-warning">Ваш аккаунт был успешно удалён.</div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Электронная почта</label>
                            <input type="email" name="username" class="form-control"
                                   placeholder="example@mail.com"
                                   required
                                   title="Пожалуйста, введите корректный адрес электронной почты">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Войти</button>
                    </form>
                    <div class="mt-3 text-center">
                        Нет аккаунта? <a href="/register">Зарегистрироваться</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
