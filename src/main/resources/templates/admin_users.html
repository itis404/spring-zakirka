<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Управление пользователями</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h2>Администрирование пользователей</h2>
    <p class="text-muted">Назначение ролей пользователям.</p>

    <div th:if="${param.updated}" class="alert alert-success">Роль пользователя обновлена.</div>

    <table class="table table-striped bg-white shadow-sm">
        <thead>
        <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Имя</th>
            <th>Текущая роль</th>
            <th>Назначить роль</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}">1</td>
            <td th:text="${u.email}">email</td>
            <td th:text="${u.firstName + ' ' + u.lastName}">Name</td>
            <td><span class="badge bg-secondary" th:text="${u.role}">USER</span></td>
            <td>
                <form th:action="@{/admin/users/role}" method="post" class="d-flex gap-2">
                    <input type="hidden" name="userId" th:value="${u.id}">
                    <select name="role" class="form-select form-select-sm">
                        <option value="USER">USER</option>
                        <option value="OWNER">OWNER</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                    <button type="submit" class="btn btn-sm btn-primary">Сохранить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
