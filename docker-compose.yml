services:
  app:
    build: .
    container_name: laundry-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/laundry_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATA_REDIS_HOST: redis
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}

  db:
    image: postgres:15
    container_name: laundry-db
    environment:
      POSTGRES_DB: laundry_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: laundry-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
